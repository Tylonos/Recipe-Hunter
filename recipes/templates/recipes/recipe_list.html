<!DOCTYPE html>
<html>
<head>
    <title>Recipes</title>
</head>
<body>
    <h1>Recipe List</h1>

    {% for recipe in recipes %}
        <div>
            <h2>
                <a href="{% url 'recipe_detail' recipe.id %}">{{ recipe.title }}</a>
            </h2>
            <p>{{ recipe.description }}</p>
            <p>Cooking time: {{ recipe.cooking_time }} minutes</p>
            <hr>
        </div>
    {% empty %}
        <p>No recipes found.</p>
    {% endfor %}
</body>
</html>
